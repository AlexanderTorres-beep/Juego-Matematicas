<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>🌟 Aventura de los Números Mágicos</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Comic Sans MS',cursive;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}.container{background:white;border-radius:30px;padding:30px;max-width:800px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center}h1{color:#667eea;font-size:2em;margin-bottom:20px;text-shadow:2px 2px 4px rgba(0,0,0,0.1)}.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:20px}.game-card{background:linear-gradient(135deg,#ffd700,#ffed4e);border-radius:20px;padding:20px;cursor:pointer;transition:transform 0.3s;box-shadow:0 5px 15px rgba(0,0,0,0.2)}.game-card:hover{transform:scale(1.05) rotate(2deg)}.game-icon{font-size:2.5em;margin-bottom:10px}.game-title{font-weight:bold;color:#333;font-size:1.1em}#gameArea{display:none;margin-top:20px}.back-btn{background:#ff6b6b;color:white;border:none;padding:10px 20px;border-radius:20px;cursor:pointer;margin-bottom:15px;font-weight:bold}.score-board{background:#ffd700;padding:15px;border-radius:15px;margin-bottom:15px;font-weight:bold;display:flex;justify-content:space-around}.number-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:1.5em;font-weight:bold;margin:5px;cursor:pointer;background:#667eea;color:white;transition:transform 0.2s}.number-btn:hover{transform:scale(1.1)}.number-btn.correct{background:#4cd964}.number-btn.wrong{background:#ff6b6b;animation:shake 0.5s}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}.counting-container{font-size:3em;margin:20px 0}.math-problem{font-size:2.5em;margin:20px 0;color:#333;font-weight:bold}.answer-input{width:100px;height:60px;font-size:2em;text-align:center;border:3px solid #ddd;border-radius:15px;margin:0 10px}.check-btn{background:#4cd964;color:white;border:none;padding:15px 30px;border-radius:25px;font-size:1.2em;cursor:pointer;margin-top:15px;font-weight:bold}.feedback{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:white;padding:30px 50px;border-radius:25px;box-shadow:0 20px 60px rgba(0,0,0,0.3);text-align:center;z-index:1000;transition:all 0.5s}.feedback.show{transform:translate(-50%,-50%) scale(1)}.feedback-icon{font-size:4em}</style></head><body><div class="container"><h1>🌟 Aventura de los Números Mágicos</h1><div id="mainMenu" class="menu-grid"><div class="game-card" onclick="startGame('counting')"><div class="game-icon">🍎</div><div class="game-title">Contar</div></div><div class="game-card" onclick="startGame('addition')"><div class="game-icon">➕</div><div class="game-title">Sumar</div></div><div class="game-card" onclick="startGame('subtraction')"><div class="game-icon">➖</div><div class="game-title">Restar</div></div><div class="game-card" onclick="startGame('sequence')"><div class="game-icon">🔢</div><div class="game-title">Secuencia</div></div></div><div id="gameArea"><button class="back-btn" onclick="backToMenu()">← Volver</button><div class="score-board"><span>⭐ Puntos: <span id="score">0</span></span><span>Nivel: <span id="level">1</span></span></div><div id="gameContent"></div></div></div><div class="feedback" id="feedback"><div class="feedback-icon" id="feedbackIcon">🎉</div><div id="feedbackText">¡Excelente!</div></div><script>let currentGame='',score=0,level=1;function startGame(game){currentGame=game;score=0;level=1;document.getElementById('mainMenu').style.display='none';document.getElementById('gameArea').style.display='block';document.getElementById('score').textContent=score;document.getElementById('level').textContent=level;loadGame()}function backToMenu(){document.getElementById('gameArea').style.display='none';document.getElementById('mainMenu').style.display='grid'}function loadGame(){const content=document.getElementById('gameContent');content.innerHTML='';if(currentGame==='counting'){const count=Math.floor(Math.random()*8)+3;let html='<div style="font-size:2em;margin:20px;">Cuenta las manzanas:</div><div class="counting-container">';for(let i=0;i<count;i++)html+='🍎 ';html+='</div><div style="display:flex;justify-content:center;flex-wrap:wrap;">';const options=[count];while(options.length<4){let n=Math.floor(Math.random()*10)+1;!options.includes(n)&&options.push(n)}options.sort(()=>Math.random()-0.5);options.forEach(n=>{html+=`<button class="number-btn" onclick="checkCount(${n},${count},this)">${n}</button>`});html+='</div>';content.innerHTML=html}else if(currentGame==='addition'){const a=Math.floor(Math.random()*8)+1,b=Math.floor(Math.random()*8)+1;content.innerHTML=`<div class="math-problem">${a} + ${b} = <input type="number" class="answer-input" id="ans"><button class="check-btn" onclick="checkAdd(${a},${b})">✓ Verificar</button></div>`}else if(currentGame==='subtraction'){const total=Math.floor(Math.random()*8)+5,eat=Math.floor(Math.random()*(total-1))+1;let html=`<div style="font-size:1.5em;margin:20px;">Tenemos ${total} manzanas 🍎<br>Comemos ${eat}<br>¿Cuántas quedan?</div><div style="display:flex;justify-content:center;flex-wrap:wrap;">`;const options=[total-eat];while(options.length<4){let n=Math.floor(Math.random()*total);!options.includes(n)&&n>=0&&options.push(n)}options.sort(()=>Math.random()-0.5);options.forEach(n=>{html+=`<button class="number-btn" onclick="checkSub(${n},${total-eat},this)">${n}</button>`});html+='</div>';content.innerHTML=html}else if(currentGame==='sequence'){const start=Math.floor(Math.random()*5)+1,step=Math.floor(Math.random()*2)+1,seq=[];for(let i=0;i<5;i++)seq.push(start+i*step);const hidden=Math.floor(Math.random()*3)+1;let html='<div style="font-size:1.5em;margin:20px;">¿Qué número falta?</div><div style="font-size:2em;margin:20px;">';for(let i=0;i<5;i++)html+=i===hidden?'❓ ':seq[i]+' ';html+='</div><div style="display:flex;justify-content:center;flex-wrap:wrap;">';const options=[seq[hidden]];while(options.length<4){let n=seq[hidden]+Math.floor(Math.random()*6)-3;!options.includes(n)&&n>0&&options.push(n)}options.sort(()=>Math.random()-0.5);options.forEach(n=>{html+=`<button class="number-btn" onclick="checkSeq(${n},${seq[hidden]},this)">${n}</button>`});html+='</div>';content.innerHTML=html}}function checkCount(ans,correct,btn){if(ans===correct){btn.classList.add('correct');showFeedback(true,'¡Muy bien! 🎉');score+=10;document.getElementById('score').textContent=score;setTimeout(loadGame,1500)}else{btn.classList.add('wrong');showFeedback(false,'Intenta de nuevo 💪')}}function checkAdd(a,b){const ans=parseInt(document.getElementById('ans').value);if(ans===a+b){showFeedback(true,'¡Correcto! ⭐');score+=15;document.getElementById('score').textContent=score;setTimeout(loadGame,1500)}else{showFeedback(false,'Casi... 🤔')}}function checkSub(ans,correct,btn){if(ans===correct){btn.classList.add('correct');showFeedback(true,'¡Perfecto! 🍎');score+=20;document.getElementById('score').textContent=score;setTimeout(loadGame,1500)}else{btn.classList.add('wrong');showFeedback(false,'Sigue contando 🍎')}}function checkSeq(ans,correct,btn){if(ans===correct){btn.classList.add('correct');showFeedback(true,'¡Descubriste! 🔍');score+=25;document.getElementById('score').textContent=score;setTimeout(loadGame,1500)}else{btn.classList.add('wrong');showFeedback(false,'Observa bien 🔢')}}function showFeedback(success,msg){const fb=document.getElementById('feedback'),icon=document.getElementById('feedbackIcon'),text=document.getElementById('feedbackText');icon.textContent=success?'🎉':'🤔';text.textContent=msg;text.style.color=success?'#4cd964':'#ff6b6b';fb.classList.add('show');setTimeout(()=>fb.classList.remove('show'),1500)}</script></body></html>
